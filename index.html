<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin-Etch-a-Sketch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class = "gameboy-body">
        <div class="screen-bezel">
            <div class ="grid-container game-screen"></div>
            <div class="gameboy-title">Etch-a-Sketch</div>
         </div>
        <div class="controls">
            <div class="circle-button-container">
                <div class="btn-wrapper">
                    <button class="btn rainbow"></button>
                    <div class="rainbow-textbox">Rainbow</div>
                </div>
                <div class="btn-wrapper"> 
                    <button class="btn shade"></button>
                    <div class="shade-textbox">Shade</div>
                </div>
                
            </div>
            <div class="color-picker-wrapper">
                <div class="picked-color-bezel">
                    <div class="picked-color"></div>
                </div>
                <button class="btn color-picker"></button>
                <div class="color-picker-textbox">Pick a color</div>
            </div>
            <div class="right-wrapper">
                <div class="textbox-bezel">
                    <div class="grid-size-value">xxx</div>
                    <div class="grid-size-textbox">Canva Size</div>
                </div>
                <div class="d-pad">
                    <div class="soft-arrow up"></div>
                    <div class="soft-arrow down"></div>
                </div>
            </div>
        </div>
        <div class="reset-btn">RESET</div>
    </div>
    
</body>
<script src="script.js"></script>
</html>
